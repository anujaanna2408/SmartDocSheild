services:
  - type: web
    name: smartdocshield
    env: python
    plan: free
    region: oregon
    pythonVersion: "3.10.12"
    buildCommand: >
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm &&
      python -m nltk.downloader punkt punkt_tab stopwords
    startCommand: "gunicorn --workers=1 --timeout=120 --bind=0.0.0.0:$PORT server:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: FLASK_ENV
        value: production
    disk:
      name: smartdocshield-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
